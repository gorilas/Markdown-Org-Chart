kind = "web"
previewPath = "/"
title = "Organigrama desde Markdown (DESY)"
version = "1.0.0"
id = "artifacts/orgchart-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24479

[services.development]
run = "pnpm --filter @workspace/orgchart-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orgchart-pwa", "run", "build" ]
publicDir = "artifacts/orgchart-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24479"
BASE_PATH = "/"
